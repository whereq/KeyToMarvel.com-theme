<!-- Golden YinYang — matches favicon.svg, with gold border ring -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Gold border ring -->
  <circle cx="50" cy="50" r="49" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.85"/>

  <!-- 1. Yin (dark) base -->
  <circle cx="50" cy="50" r="46" fill="#0f1120"/>

  <!-- 2. Yang (gold) right semicircle -->
  <path d="M50,4 A46,46,0,0,1,50,96 L50,4 Z" fill="#f59e0b"/>

  <!-- 3. Yang head (gold top circle) -->
  <circle cx="50" cy="27" r="23" fill="#f59e0b"/>

  <!-- 4. Yin head (dark bottom circle) -->
  <circle cx="50" cy="73" r="23" fill="#0f1120"/>

  <!-- 5. Yin eye — dark dot inside yang (gold) area -->
  <circle cx="50" cy="27" r="9" fill="#0f1120"/>

  <!-- 6. Yang eye — gold dot inside yin (dark) area -->
  <circle cx="50" cy="73" r="9" fill="#f59e0b"/>

</svg>
