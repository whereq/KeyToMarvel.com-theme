# Login theme — user profile attribute display names
#
# ⚠️  These keys are compiled into the JAR via login/i18n.ts → withCustomTranslations().
#     DO NOT deploy this file to the Keycloak themes volume as a filesystem override.
#     Doing so creates themes/k2m-theme-vegeta/login/ on disk, which causes Keycloak's
#     FolderThemeProvider to claim the entire login theme type.  Files absent from that
#     directory (including login.ftl) then fall back to the PARENT keycloak theme instead
#     of the JAR, breaking the Keycloakify React login UI.
#
# This file is kept as a reference.  To add/change a key:
#   1. Update login/i18n.ts → withCustomTranslations()
#   2. Update this file to stay in sync (documentation only)
#   3. Run yarn build-keycloak-theme and redeploy the JAR

firstName=First name
lastName=Last name
username=Username
email=Email
locale=Locale
avatar=Avatar
