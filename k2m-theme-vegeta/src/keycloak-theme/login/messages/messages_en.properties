# Login theme — user profile attribute display names (volume-mounted override)
#
# Purpose: Keycloak Admin Console validates that any "${key}" display name set on a
# User Profile attribute can be resolved from the active login theme's message bundle
# before saving. If the key is missing, it throws:
#   "Please add translations before saving: {{error}}"
#
# These keys resolve the standard Keycloak default attribute display names:
#   Attribute "firstName"  → display name "${firstName}"  → requires key "firstName"
#   Attribute "lastName"   → display name "${lastName}"   → requires key "lastName"
#   etc.
#
# Note: The JAR (compiled from src/keycloak-theme/layout/i18n.ts) also contains these keys.
# This volume-mounted file takes precedence over the JAR, making it possible to add or fix
# keys without a full JAR rebuild. Parent=keycloak in theme.properties ensures all other
# standard Keycloak login messages remain available through inheritance.

firstName=First name
lastName=Last name
username=Username
email=Email
locale=Locale
avatar=Avatar
